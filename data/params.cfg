# Model number (1-based): select which MODEL from the PDB file will be used
model_number: 1

# Chain identifier: select which chain (segid) in the chosen model will be processed
chain_id: A

# Atom selection mode:
#   full_chain			| include all atoms from the chain
#   backbone			| include backbone atoms: N, CA, C
#   backbone_plus_hydrogens	| backbone atoms + directly bonded hydrogens
#   backbone_plus_neighbors	| backbone atoms + all directly bonded neighbors
atom_selection: backbone_plus_hydrogens

# NMR-derived distance constraints mode
#   (note: covalent, planar, and peptide-group distances are always treated as precise)
#
#   When hydrogens are not explicitly included (e.g. atom_selection = backbone),
#   NOE proton restraints are mapped as HN -> N and HA -> C, yielding heavy-atom
#   pairs such as N-N, N-C, and C-C. Reference distances d_ij are obtained directly from the PDB structure.
#
#   precise			| treat NMR distances as exact values
#   interval_centered		| synthetic intervals around d_ij:
#				|   D_ij = [max{d*_ij - ε_ij/2, vdW_threshold},
#				|           min{d*_ij + ε_ij/2, max_distance}]
#				|   where d*_ij ~ N(d_ij, (ε_ij / 8)^2), with
#				|   ε_ij = 8σ (i.e., ±4σ around the mean).
#				|   uses: epsilon_short, epsilon_long, max_distance,
#				|         vdw_threshold
#   interval_experimental	| NOESY-based intervals using intensity classes
#				| (strong, medium, weak)
#				|   D_ij = [vdw_threshold, d_class]
#				|   where d_class ∈ {noe_strong, noe_medium, noe_weak} (upper bounds)
#				|   uses: noe_strong, noe_medium, noe_weak, vdw_threshold
distance_constraints: interval_centered

# Parameters for distance_constraints = interval_centered
epsilon_short: 1.0	# interval width ε_ij for atoms in the same or adjacent residues (suggested: 1.0 Å)
epsilon_long: 2.0	# interval width ε_ij for atoms in non-adjacent residues (suggested: 2.0 Å)
max_distance: 5.0	# upper bound for interval distances (suggested: 5.0 Å)

# Parameters for distance_constraints = interval_experimental
noe_strong: 2.5		# upper distance bound for strong NOE peaks (suggested: 2.5 Å)
noe_medium: 3.5		# upper distance bound for medium NOE peaks (suggested: 3.5 Å)
noe_weak: 5.0		# upper distance bound for weak NOE peaks (suggested: 5.0 Å)

# Shared parameter for interval modes
vdw_threshold: 1.8	# van der Waals radius for H-H (suggested: 1.8 Å)

# Collect van der Waals lower-bound distance constraints (yes | no)
vdw_constraints: yes

# Width of torsion angle intervals (degrees)
#
# The reference torsion angle τ_ij is obtained from the PDB structure.
# A perturbed value τ*_ij is sampled from a normal distribution
#     τ*_ij ~ N(τ_ij , (torsion_angle_width / 8)^2)
# and the torsion interval is defined as
#     [τ*_ij - torsion_angle_width/2 , τ*_ij + torsion_angle_width/2].
# With this definition, torsion_angle_width corresponds to 8σ (i.e., ±4σ around the mean).
torsion_angle_width: 50.0

# Percentage of estimated backbone torsion angles (phi/psi) to include [0-100 %]
# Selected angles are generated as intervals as described above.
# Angles not included in this percentage receive the default range [-180°, 180°].
percentage_backbone_torsion_angles: 100.0
